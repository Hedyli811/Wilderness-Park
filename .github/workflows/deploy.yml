name: Full Auto Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Full Stack
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "🚀 开始全栈自动部署..."

            # 1. 拉取最新代码
            cd /opt/app/Wilderness-Park
            echo "拉取最新代码..."
            git pull origin main

            # 2. 构建后端
            echo "构建后端..."
            cd mall4j
            mvn clean package -DskipTests

            # 3. 重启后端服务
            echo "重启后端服务..."
            sudo systemctl restart wilderness-park-admin
            sudo systemctl restart wilderness-park-api

            # 4. 构建前端（在服务器上）
            echo "构建前端..."
            cd ../mall4v

            # 检查Node.js版本，如果太低则升级
            if ! command -v node &> /dev/null || [ $(node -v | cut -d'v' -f2 | cut -d'.' -f1) -lt 16 ]; then
              echo "安装Node.js 18..."
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 安装依赖并构建
            npm ci
            npm run build

            # 5. 部署前端
            echo "部署前端..."
            sudo rm -rf /var/www/admin/*
            sudo cp -r dist/* /var/www/admin/
            sudo chown -R nginx:nginx /var/www/admin

            # 6. 重启Nginx
            echo "重启Nginx..."
            sudo systemctl reload nginx

            echo "✅ 全栈部署完成！"
            echo "🌐 访问地址: http://${{ secrets.SERVER_HOST }}/admin/"
